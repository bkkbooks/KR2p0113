body:
  text: 散見簡牘合輯甘肅玉門花海漢簡制詔皇大子勝體不安今將絕矣與地合同眾不復起謹視皇大之𦭡加曾勝在善禺百姓賦斂以理存賢近聖必聚諝士表教奉先自致天子胡侅自汜滅名絕紀審察勝言眾身毋久蒼蒼之天不可得久視堂堂之地不可得久履道此絕矣告後世及其孫子忽忽錫錫恐見故里毋負天地更亡更在立如野廬下敦閭里人固當死慎毋敢賤弟時謹伏地再拜請翁系足下善毋恙甚苦候望事方春不和時伏翁系將侍近衣幸酒食明察蓬火事寬忽小人毋行所時幸甚甚伏地再拜請時伏翁系有往來者幸賜記令時奉聞翁系嚴教元平元年七月庚子禽寇卒馮時賣櫜絡六枚楊卿所約至八月十日與時小麥七石六斗過月十五日斗計盖卿任小麥檄到禽寇日失中時卒會郭以營庇邵駢郇𨚮鄐郢傅贛董僕李貝二月五日第七吏賣皂布復褌即不在知責家長孫董中卿幸甚宜數至前會事甚甚董幸甚長足下士謹蒲行孫子辭蒲二月十一日蒲何聞備邊塞候望吏官繕去署亡乏迹迹候不憂事邊唯兼尉史忠何長卿敖像桀長庾索刃皆徐中高不幼生東證邊董印印西枸甲子乙丑丙壬申癸酉甲蒼頡作書以教後嗣幼子承調謹慎敬戒勉力諷誦晝夜勿置務成史計會辯治超等蒼頡作書以教後嗣幼子承調謹慎敬戒勉力諷誦晝夜勿置苟務成史計會辯治超等蒼頡作書以教後嗣幼子承調謹慎敬戒勉力諷誦晝夜勿置苟務成史計會辯治超等曰書人名姓趙苽韓范鼠張猪翟如竇數心馮聚陳涓曰書人名姓趙苽韓范鼠張猪翟如竇所買布踈大郭成買布三尺五寸直一石四斗始樂尹虎買布三尺五寸直一石四斗萬貰范融買布一丈二尺直四石二斗長生趙伯二石凡九斛前付卿以入所買布踈檄賦虜賦勿物華定國及遣第八隧稾矢箭閏月七錢四年一錢五八月中以付子竟月未出買閏月入十三閏月以北癸卯三宿取二斗亭長督它日夜繕為旁郡深目旁郡深目亭上深目亭上深目東部深目西部深目一隻二斗不不不史月壬戌王主蒼蒼之天不可史所當時伏謝馮郅所伏地第二車縣官奉侍伏地再拜子子亟古有固當京東庫癸北晝作長辛酉壬戌癸亥入戊子己丑青昌耶大字令人不尺美不輕事重廬下魂魄偊陽兵家祭之癸卿足書教人不人疌晉谷左有甚苦處患伏地再大王子時伏地幸甚再拜百姓賦斂戌甲得弓寇進上造兆更公寨閣賦訪眾甚甚今邊車教董何患久教癸虜寇四枚大祭尊十五百乃行子女
